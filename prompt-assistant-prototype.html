<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PromptMate · 词库优先原型</title>
  <style>
    :root{--ink:#18202d;--muted:#687386;--line:#e2e6ec;--soft:#f5f7fa;--paper:#fff;--blue:#2563eb;--blue-soft:#eef4ff;--green:#147d64;--orange:#bd5b22;--purple:#7557c7;--shadow:0 1px 2px #0f306a0a,0 8px 26px #0f306a0d}
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{font:14px/1.5 "Segoe UI Variable Text","Segoe UI","Microsoft YaHei UI",system-ui,sans-serif;color:var(--ink);background:var(--soft);overflow:hidden;-webkit-font-smoothing:antialiased}button,input,textarea{font:inherit;color:inherit}button{cursor:pointer}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid #bfdbfe;outline-offset:2px}
    .topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:16px}.brand{display:flex;align-items:center;gap:10px;font-weight:720;min-width:172px}.mark{width:32px;height:32px;border-radius:10px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:12px}.brand small{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:-2px}.global-search{width:min(560px,46vw);height:40px;border:1px solid var(--line);background:var(--soft);border-radius:11px;display:flex;align-items:center;padding:0 12px;gap:9px}.global-search:focus-within{background:#fff;border-color:#9bbcf8;box-shadow:0 0 0 3px #dbeafe}.global-search input{border:0;outline:0;background:transparent;width:100%}.key{font-size:11px;color:#8b95a5;border:1px solid #d8dde5;background:#fff;border-radius:5px;padding:1px 6px}.top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}.mode{display:flex;background:var(--soft);border:1px solid var(--line);padding:2px;border-radius:9px}.mode button{height:31px;padding:0 12px;border:0;background:transparent;border-radius:7px;color:var(--muted)}.mode button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px #0002;font-weight:600}.icon-btn{width:38px;height:38px;border:1px solid var(--line);background:#fff;border-radius:10px}.icon-btn:hover{background:var(--soft)}.basket-toggle{display:none}
    .app{height:calc(100% - 60px);display:grid;grid-template-columns:190px minmax(560px,1fr) 328px}.sidebar{background:#fff;border-right:1px solid var(--line);padding:18px 12px;overflow:auto}.side-title{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;padding:0 10px 8px}.category{width:100%;height:38px;border:0;background:transparent;border-radius:9px;padding:0 10px;display:flex;align-items:center;gap:10px;text-align:left;color:#526075;margin:2px 0}.category:hover{background:var(--soft);color:var(--ink)}.category.active{background:var(--blue-soft);color:#174ea6;font-weight:650}.category .symbol{width:19px;text-align:center}.category .count{margin-left:auto;color:#8b95a5;font-size:11px}.side-sep{height:1px;background:var(--line);margin:16px 8px}.source-filter{display:flex;align-items:center;gap:9px;padding:7px 10px;color:#526075}.dot{width:8px;height:8px;border-radius:50%}.builtin{background:var(--blue)}.user{background:var(--green)}.ai{background:var(--orange)}.imported{background:var(--purple)}
    .catalog{overflow:auto;padding:24px 26px 70px}.catalog-head{display:flex;align-items:start;gap:16px;margin-bottom:18px}.catalog-head h1{font-size:26px;line-height:1.2;margin:0;letter-spacing:-.5px}.catalog-head p{margin:5px 0 0;color:var(--muted)}.catalog-head .summary{margin-left:auto;font-size:12px;color:var(--muted);padding-top:7px}.filters{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:22px}.filter{height:32px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:0 11px;color:#526075}.filter:hover{border-color:#b8c1ce}.filter.active{border-color:#9dbcf4;background:var(--blue-soft);color:#174ea6;font-weight:600}.section-head{display:flex;align-items:center;margin:26px 0 12px}.section-head h2{font-size:16px;margin:0}.section-head span{margin-left:8px;color:var(--muted);font-size:12px}.section-head button{margin-left:auto;border:0;background:transparent;color:var(--blue)}
    .starter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}.starter{min-height:124px;border:1px solid var(--line);background:#fff;border-radius:15px;padding:16px;box-shadow:var(--shadow);text-align:left;position:relative;overflow:hidden}.starter:before{content:"";position:absolute;inset:0 0 auto;height:4px;background:var(--tone)}.starter:hover{transform:translateY(-1px);border-color:#bac8dc}.starter .eyebrow{font-size:11px;color:var(--muted);margin-bottom:8px}.starter b{display:block;font-size:16px;margin-bottom:5px}.starter p{margin:0;color:#526075;font-size:12px;line-height:1.55}.starter .use{position:absolute;right:12px;bottom:10px;color:var(--blue);font-weight:650;font-size:12px}
    .word-grid{display:grid;grid-template-columns:repeat(3,minmax(170px,1fr));gap:10px}.word-card{min-height:130px;border:1px solid var(--line);background:#fff;border-radius:13px;padding:14px;text-align:left;position:relative;transition:.14s;cursor:pointer}.word-card:hover{border-color:#aebdd1;box-shadow:var(--shadow);transform:translateY(-1px)}.word-card.selected{border-color:#8bb1f4;background:#f8fbff}.card-top{display:flex;align-items:start;gap:8px}.word-card h3{font-size:15px;margin:0}.word-card .en{color:var(--muted);font-size:11px;margin-top:1px}.favorite{margin-left:auto;border:0;background:transparent;color:#a0a8b5;font-size:17px;padding:0 2px}.favorite.on{color:#e3a008}.word-card p{font-size:12px;color:#687386;margin:12px 0 24px;line-height:1.5}.meta{position:absolute;left:14px;right:14px;bottom:11px;display:flex;align-items:center}.source{font-size:10px;border-radius:999px;padding:2px 6px;background:var(--soft);color:var(--muted)}.source.ai-source{background:#fff4ed;color:var(--orange)}.source.user-source{background:#eefbf7;color:var(--green)}.add{margin-left:auto;width:25px;height:25px;border:1px solid var(--line);background:#fff;border-radius:7px;color:var(--blue);font-size:17px;line-height:1}.word-card.selected .add{background:var(--blue);border-color:var(--blue);color:#fff}.empty{grid-column:1/-1;padding:50px;text-align:center;color:var(--muted);border:1px dashed #cbd2dc;border-radius:14px;background:#fff}
    .basket{background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;min-width:0}.basket-head{height:58px;padding:0 18px;border-bottom:1px solid var(--line);display:flex;align-items:center}.basket-head b{font-size:15px}.basket-count{margin-left:7px;font-size:11px;color:#fff;background:var(--blue);border-radius:999px;min-width:20px;height:20px;display:grid;place-items:center;padding:0 6px}.clear{margin-left:auto;border:0;background:transparent;color:var(--muted);font-size:12px}.selected-list{padding:14px 16px 8px;display:flex;gap:7px;flex-wrap:wrap;align-content:flex-start;max-height:178px;overflow:auto}.selected-chip{border:1px solid #cbd8ed;background:var(--blue-soft);color:#174ea6;border-radius:999px;padding:6px 9px}.selected-chip span{color:#7890b4;margin-left:5px}.basket-empty{color:var(--muted);font-size:12px;padding:10px 2px}.optional{margin:8px 16px 14px}.optional label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px}.optional textarea{width:100%;min-height:64px;resize:none;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:var(--soft)}.optional textarea:focus{outline:0;border-color:#9bbcf8;background:#fff}.output{border-top:1px solid var(--line);padding:15px 16px 16px;margin-top:auto;background:#fbfcfe}.output-head{display:flex;align-items:center;margin-bottom:10px}.output-head b{font-size:12px}.language{margin-left:auto;display:flex;background:#edf0f4;border-radius:7px;padding:2px}.language button{border:0;background:transparent;border-radius:5px;font-size:11px;padding:3px 7px;color:var(--muted)}.language button.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px #0002}.output-text{min-height:110px;max-height:180px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:12px;line-height:1.7;color:#334155}.basket-actions{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}.copy,.polish{height:38px;border-radius:9px;font-weight:650}.copy{border:0;background:var(--blue);color:#fff}.copy:hover{background:#1d4ed8}.polish{border:1px solid var(--line);background:#fff;padding:0 11px;color:#526075}.hint{font-size:10px;color:var(--muted);margin-top:7px;text-align:center}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,10px);background:#172033;color:#fff;border-radius:9px;padding:9px 13px;opacity:0;pointer-events:none;transition:.18s;z-index:50}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:1120px){.app{grid-template-columns:172px 1fr}.basket{position:fixed;right:0;top:60px;bottom:0;width:328px;z-index:30;box-shadow:-18px 0 50px #0002;transform:translateX(100%);transition:.2s}.basket.open{transform:none}.basket-toggle{display:block!important}.word-grid{grid-template-columns:repeat(2,1fr)}.starter-grid{grid-template-columns:1fr 1fr}.starter:last-child{display:none}}
    @media(max-width:720px){body{overflow:auto}.topbar{position:sticky;top:0;z-index:40}.brand{min-width:auto}.brand div:last-child{display:none}.global-search{width:auto;flex:1}.global-search .key,.mode{display:none}.app{height:auto;display:block}.sidebar{position:sticky;top:60px;z-index:15;display:flex;overflow:auto;padding:8px;border-right:0;border-bottom:1px solid var(--line)}.side-title,.side-sep,.source-filter,.category .count{display:none}.category{width:auto;min-width:max-content;padding:0 11px}.catalog{padding:20px 14px 80px}.catalog-head .summary{display:none}.starter-grid,.word-grid{grid-template-columns:1fr 1fr}.basket{top:60px;width:min(340px,94vw)}.word-card{min-height:138px}}
    @media(max-width:480px){.starter-grid,.word-grid{grid-template-columns:1fr}.starter:last-child{display:block}.catalog-head h1{font-size:23px}}
    @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="mark">PM</span><div>PromptMate<small>从词库里找到灵感</small></div></div>
    <label class="global-search"><span>⌕</span><input id="search" placeholder="搜索人物、场景、风格、镜头……"><span class="key">Ctrl K</span></label>
    <div class="top-actions">
      <div class="mode" id="mediaMode"><button class="active">图片</button><button>视频</button></div>
      <button class="icon-btn basket-toggle" id="basketToggle" title="查看灵感篮">篮</button>
      <button class="icon-btn" title="设置">⚙</button>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <div class="side-title">浏览词库</div>
      <button class="category active" data-category="全部"><span class="symbol">✦</span>为你推荐<span class="count">18</span></button>
      <button class="category" data-category="人物"><span class="symbol">人</span>人物主体<span class="count">126</span></button>
      <button class="category" data-category="场景"><span class="symbol">景</span>场景环境<span class="count">284</span></button>
      <button class="category" data-category="动作"><span class="symbol">动</span>动作姿态<span class="count">168</span></button>
      <button class="category" data-category="服饰"><span class="symbol">衣</span>服装配饰<span class="count">142</span></button>
      <button class="category" data-category="光影"><span class="symbol">光</span>灯光氛围<span class="count">96</span></button>
      <button class="category" data-category="镜头"><span class="symbol">镜</span>镜头构图<span class="count">118</span></button>
      <button class="category" data-category="风格"><span class="symbol">艺</span>艺术风格<span class="count">212</span></button>
      <button class="category" data-category="画质"><span class="symbol">质</span>材质画质<span class="count">74</span></button>
      <div class="side-sep"></div>
      <div class="side-title">词条来源</div>
      <div class="source-filter"><i class="dot builtin"></i>内置精选</div>
      <div class="source-filter"><i class="dot user"></i>我的词条</div>
      <div class="source-filter"><i class="dot imported"></i>社区导入</div>
      <div class="source-filter"><i class="dot ai"></i>AI 生成</div>
    </aside>

    <main class="catalog">
      <div class="catalog-head"><div><h1 id="catalogTitle">灵感词库</h1><p>不必先想好答案，看到喜欢的就把它加入灵感篮。</p></div><span class="summary" id="summary">正在展示 18 个精选词条</span></div>
      <div class="filters" id="filters"><button class="filter active" data-filter="全部">全部</button><button class="filter" data-filter="新手友好">新手友好</button><button class="filter" data-filter="人像">人像</button><button class="filter" data-filter="电影感">电影感</button><button class="filter" data-filter="东方美学">东方美学</button><button class="filter" data-filter="自然">自然</button><button class="filter" data-filter="商业">商业</button></div>

      <section id="starterSection">
        <div class="section-head"><h2>不知道选什么？从一个组合开始</h2><span>一键加入一组协调的词条</span></div>
        <div class="starter-grid">
          <button class="starter" style="--tone:#6f8fdb" data-starter="雨夜电影人像"><div class="eyebrow">人像 · 电影感</div><b>雨夜电影人像</b><p>霓虹街道、回眸、侧逆光、中近景、浅景深</p><span class="use">加入 5 项 +</span></button>
          <button class="starter" style="--tone:#d59a63" data-starter="东方庭院叙事"><div class="eyebrow">东方 · 静谧</div><b>东方庭院叙事</b><p>中式庭院、薄雾、素色长衫、留白构图、柔光</p><span class="use">加入 5 项 +</span></button>
          <button class="starter" style="--tone:#5c9a80" data-starter="自然产品摄影"><div class="eyebrow">商业 · 自然</div><b>自然产品摄影</b><p>原木台面、晨光、植物投影、微距、干净背景</p><span class="use">加入 5 项 +</span></button>
        </div>
      </section>

      <div class="section-head"><h2 id="sectionTitle">浏览全部灵感</h2><span id="resultCount"></span><button id="shuffle">换一批</button></div>
      <div class="word-grid" id="wordGrid"></div>
    </main>

    <aside class="basket" id="basket">
      <div class="basket-head"><b>灵感篮</b><span class="basket-count" id="basketCount">0</span><button class="clear" id="clear">清空</button></div>
      <div class="selected-list" id="selectedList"></div>
      <div class="optional"><label for="optionalIdea">有明确想法时再补一句（可选）</label><textarea id="optionalIdea" placeholder="例如：人物正在回头看向镜头"></textarea></div>
      <div class="output">
        <div class="output-head"><b>自动拼装结果</b><div class="language" id="languages"><button class="active" data-language="zh">中文</button><button data-language="en">EN</button></div></div>
        <div class="output-text" id="outputText">从左侧词库选择词条，这里会自动组合。</div>
        <div class="basket-actions"><button class="copy" id="copy">复制提示词</button><button class="polish" id="polish" title="可选功能">AI 润色</button></div>
        <div class="hint">不调用 AI 也能浏览、拼装和复制</div>
      </div>
    </aside>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const words=[
      {id:"young-woman",zh:"年轻女性",en:"young woman",category:"人物",tags:["人像","新手友好"],description:"适合人像、时尚和叙事画面的通用主体。",source:"内置"},
      {id:"solitary-traveler",zh:"独行旅人",en:"solitary traveler",category:"人物",tags:["电影感","自然"],description:"给风景加入人物尺度和故事感。",source:"内置"},
      {id:"neon-rain",zh:"霓虹雨夜街道",en:"neon-lit rainy street",category:"场景",tags:["电影感","新手友好"],description:"蓝紫霓虹映在湿润路面，氛围强烈。",source:"社区"},
      {id:"chinese-courtyard",zh:"静谧中式庭院",en:"serene Chinese courtyard",category:"场景",tags:["东方美学","自然"],description:"白墙黛瓦、植物与留白构成安静空间。",source:"内置"},
      {id:"misty-forest",zh:"清晨薄雾森林",en:"misty forest at dawn",category:"场景",tags:["自然","新手友好"],description:"柔和晨光穿过薄雾，层次自然舒展。",source:"内置"},
      {id:"wood-studio",zh:"原木自然摄影台",en:"natural wood studio set",category:"场景",tags:["商业","自然"],description:"适合护肤品、香氛和生活方式产品。",source:"我的"},
      {id:"look-back",zh:"行走中回眸",en:"looking back while walking",category:"动作",tags:["人像","电影感"],description:"比静态站姿更有叙事和瞬间感。",source:"内置"},
      {id:"wind-hair",zh:"微风吹动发丝",en:"hair gently moving in the breeze",category:"动作",tags:["人像","自然"],description:"用轻微动态打破僵硬感。",source:"AI"},
      {id:"white-dress",zh:"飘逸白色长裙",en:"flowing white dress",category:"服饰",tags:["人像","新手友好"],description:"轮廓轻盈，适合自然、梦幻与电影风格。",source:"内置"},
      {id:"linen-robe",zh:"素色亚麻长衫",en:"plain linen robe",category:"服饰",tags:["东方美学","自然"],description:"低饱和材质，呈现克制朴素的质感。",source:"内置"},
      {id:"rim-light",zh:"柔和侧逆光",en:"soft rim lighting",category:"光影",tags:["人像","电影感","新手友好"],description:"勾勒主体轮廓，让人物从背景中分离。",source:"内置"},
      {id:"volumetric",zh:"薄雾体积光",en:"volumetric light through mist",category:"光影",tags:["电影感","自然"],description:"光线在雾气中形成可见层次。",source:"社区"},
      {id:"leaf-shadow",zh:"植物光影投射",en:"botanical shadow play",category:"光影",tags:["商业","自然"],description:"叶片投影让产品画面更轻松自然。",source:"内置"},
      {id:"medium-close",zh:"中近景",en:"medium close-up",category:"镜头",tags:["人像","新手友好"],description:"兼顾人物表情与少量环境信息。",source:"内置"},
      {id:"negative-space",zh:"留白构图",en:"negative space composition",category:"镜头",tags:["东方美学","商业"],description:"减少干扰，为主体和文字预留呼吸空间。",source:"内置"},
      {id:"macro",zh:"细节微距",en:"macro detail shot",category:"镜头",tags:["商业"],description:"突出材质、纹理和产品工艺细节。",source:"内置"},
      {id:"cinematic",zh:"克制的电影感",en:"restrained cinematic style",category:"风格",tags:["电影感","人像"],description:"不过度调色，以光影和构图建立叙事。",source:"我的"},
      {id:"ink-wash",zh:"当代水墨气质",en:"contemporary ink-wash aesthetic",category:"风格",tags:["东方美学"],description:"保留水墨留白与层叠，同时避免古旧感。",source:"AI"}
    ];
    const starterSets={
      "雨夜电影人像":["neon-rain","look-back","rim-light","medium-close","cinematic"],
      "东方庭院叙事":["chinese-courtyard","volumetric","linen-robe","negative-space","ink-wash"],
      "自然产品摄影":["wood-studio","leaf-shadow","macro","negative-space","misty-forest"]
    };
    const $=selector=>document.querySelector(selector),$$=selector=>[...document.querySelectorAll(selector)];
    const state={category:"全部",filter:"全部",query:"",language:"zh",selected:new Set(["neon-rain","look-back","rim-light"])};
    const sourceClass=source=>source==="AI"?"ai-source":source==="我的"?"user-source":"";
    function visibleWords(){return words.filter(word=>(state.category==="全部"||word.category===state.category)&&(state.filter==="全部"||word.tags.includes(state.filter))&&(!state.query||`${word.zh} ${word.en} ${word.description} ${word.tags.join(" ")}`.toLowerCase().includes(state.query)))}
    function renderWords(){const list=visibleWords();$("#resultCount").textContent=`${list.length} 个词条`;$("#summary").textContent=`正在展示 ${list.length} 个精选词条`;$("#wordGrid").innerHTML=list.length?list.map(word=>`<article class="word-card ${state.selected.has(word.id)?"selected":""}" data-id="${word.id}" tabindex="0" aria-pressed="${state.selected.has(word.id)}" aria-label="${state.selected.has(word.id)?"从灵感篮移除":"加入灵感篮"}：${word.zh}"><div class="card-top"><div><h3>${word.zh}</h3><div class="en">${word.en}</div></div><button class="favorite" title="收藏">☆</button></div><p>${word.description}</p><div class="meta"><span class="source ${sourceClass(word.source)}">${word.source}</span><span class="add" aria-hidden="true">${state.selected.has(word.id)?"✓":"+"}</span></div></article>`).join(""):`<div class="empty">没有找到相关词条，试试更短的关键词。</div>`;bindCards()}
    function bindCards(){$$(".word-card").forEach(card=>{card.onclick=event=>{if(!event.target.closest(".favorite"))toggleWord(card.dataset.id)};card.onkeydown=event=>{if(event.target===card&&(event.key==="Enter"||event.key===" ")){event.preventDefault();toggleWord(card.dataset.id)}};card.querySelector(".favorite").onclick=event=>{event.stopPropagation();event.currentTarget.classList.toggle("on");event.currentTarget.textContent=event.currentTarget.classList.contains("on")?"★":"☆"}})}
    function toggleWord(id){state.selected.has(id)?state.selected.delete(id):state.selected.add(id);renderWords();renderBasket()}
    function renderBasket(){const selected=words.filter(word=>state.selected.has(word.id));$("#basketCount").textContent=selected.length;$("#selectedList").innerHTML=selected.length?selected.map(word=>`<button class="selected-chip" data-id="${word.id}">${word.zh}<span>×</span></button>`).join(""):`<div class="basket-empty">点击任意词条卡片，把灵感放进来。</div>`;$$(".selected-chip").forEach(chip=>chip.onclick=()=>toggleWord(chip.dataset.id));renderOutput()}
    function renderOutput(){const selected=words.filter(word=>state.selected.has(word.id));const optional=$("#optionalIdea").value.trim();const parts=selected.map(word=>word[state.language]);if(optional)parts.unshift(optional);$("#outputText").textContent=parts.length?parts.join(state.language==="zh"?"，":", ")+(state.language==="zh"?"。":"."):"从左侧词库选择词条，这里会自动组合。"}
    function toast(message){$("#toast").textContent=message;$("#toast").classList.add("show");setTimeout(()=>$("#toast").classList.remove("show"),1200)}
    $$(".category").forEach(button=>button.onclick=()=>{state.category=button.dataset.category;$$(".category").forEach(item=>item.classList.toggle("active",item===button));$("#catalogTitle").textContent=state.category==="全部"?"灵感词库":`${state.category}灵感`;$("#starterSection").style.display=state.category==="全部"?"block":"none";$("#sectionTitle").textContent=state.category==="全部"?"浏览全部灵感":`${state.category}词条`;renderWords()});
    $$(".filter").forEach(button=>button.onclick=()=>{state.filter=button.dataset.filter;$$(".filter").forEach(item=>item.classList.toggle("active",item===button));renderWords()});
    $("#search").oninput=event=>{state.query=event.target.value.trim().toLowerCase();renderWords()};
    $$(".starter").forEach(button=>button.onclick=()=>{starterSets[button.dataset.starter].forEach(id=>state.selected.add(id));renderWords();renderBasket();toast(`已加入「${button.dataset.starter}」`)});
    $("#clear").onclick=()=>{state.selected.clear();renderWords();renderBasket()};
    $("#optionalIdea").oninput=renderOutput;
    $$("#languages button").forEach(button=>button.onclick=()=>{state.language=button.dataset.language;$$("#languages button").forEach(item=>item.classList.toggle("active",item===button));renderOutput()});
    $("#copy").onclick=async()=>{try{await navigator.clipboard.writeText($("#outputText").innerText)}catch{}toast("提示词已复制")};
    $("#polish").onclick=()=>toast("AI 润色是可选能力，不影响词库拼装");
    $("#shuffle").onclick=()=>{words.push(...words.splice(0,3));renderWords()};
    $$("#mediaMode button").forEach(button=>button.onclick=()=>{$$("#mediaMode button").forEach(item=>item.classList.toggle("active",item===button));toast(`已切换到${button.textContent}词库`)});
    $("#basketToggle").onclick=()=>$("#basket").classList.toggle("open");
    document.addEventListener("keydown",event=>{if(event.ctrlKey&&event.key.toLowerCase()==="k"){event.preventDefault();$("#search").focus()}if(event.key==="Escape")$("#basket").classList.remove("open")});
    renderWords();renderBasket();
  </script>
</body>
</html>
